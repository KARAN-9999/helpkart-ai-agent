<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HelpKart AI Support Agent</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #343541;
      color: #ececf1;
      height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 260px;
      background: #202123;
      padding: 16px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2f3037;
    }

    .sidebar h2 {
      margin: 0 0 16px 0;
      font-size: 18px;
      font-weight: 600;
    }

    .new-chat-btn {
      background: #2a2b32;
      color: #fff;
      border: 1px solid #4d4d4f;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 16px;
      transition: 0.2s;
    }

    .new-chat-btn:hover {
      background: #3a3b42;
    }

    .sidebar-note {
      margin-top: auto;
      font-size: 12px;
      color: #a9a9b3;
      line-height: 1.5;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .topbar {
      padding: 16px 24px;
      border-bottom: 1px solid #4a4b57;
      background: #343541;
      font-size: 18px;
      font-weight: 600;
    }

    .status {
      font-size: 13px;
      color: #b4b4c3;
      margin-top: 6px;
      font-weight: 400;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      scroll-behavior: smooth;
    }

    .message-row {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 18px 20px;
    }

    .message-row.user {
      background: #343541;
    }

    .message-row.assistant {
      background: #444654;
    }

    .message-content {
      width: 100%;
      max-width: 850px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      font-weight: 700;
    }

    .avatar.user {
      background: #19c37d;
      color: white;
    }

    .avatar.assistant {
      background: #7c3aed;
      color: white;
    }

    .bubble {
      white-space: pre-wrap;
      line-height: 1.7;
      font-size: 15px;
      color: #ececf1;
      padding-top: 4px;
    }

    .input-area {
      border-top: 1px solid #4a4b57;
      background: #343541;
      padding: 18px 20px 24px;
      display: flex;
      justify-content: center;
    }

    .input-wrapper {
      width: 100%;
      max-width: 850px;
      position: relative;
    }

    textarea {
      width: 100%;
      resize: none;
      border: 1px solid #565869;
      background: #40414f;
      color: #ececf1;
      border-radius: 14px;
      padding: 16px 56px 16px 16px;
      font-size: 15px;
      min-height: 58px;
      max-height: 200px;
      outline: none;
    }

    textarea::placeholder {
      color: #b4b4c3;
    }

    .send-btn {
      position: absolute;
      right: 12px;
      bottom: 12px;
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 8px;
      background: #19c37d;
      color: #fff;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
    }

    .send-btn:hover {
      background: #14a86b;
    }

    .typing {
      opacity: 0.8;
      font-style: italic;
      color: #c5c5d2;
    }

    @media (max-width: 900px) {
      .sidebar {
        display: none;
      }

      .topbar {
        padding: 14px 16px;
      }

      .message-row {
        padding: 16px 12px;
      }

      .input-area {
        padding: 14px 12px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>HelpKart AI</h2>
    <button class="new-chat-btn" onclick="startNewChat()">+ New Chat</button>
    <div class="sidebar-note">
      Low-latency AI support agent with RAG, conversation memory, and WebSocket-based real-time interaction.
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      HelpKart AI Support Agent
      <div id="status" class="status">Connecting...</div>
    </div>

    <div id="chatContainer" class="chat-container"></div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="messageInput" placeholder="Message HelpKart AI..." rows="1"></textarea>
        <button class="send-btn" onclick="sendMessage()">↑</button>
      </div>
    </div>
  </div>

  <script>
    let ws;
    let currentAssistantBubble = null;

    const chatContainer = document.getElementById("chatContainer");
    const statusBox = document.getElementById("status");
    const input = document.getElementById("messageInput");

    function connectSocket() {
      const ws = new WebSocket("wss://helpkart-ai-agent.onrender.com/chat");

      ws.onopen = () => {
        statusBox.textContent = "Connected";
      };

      ws.onclose = () => {
        statusBox.textContent = "Disconnected";
      };

      ws.onerror = () => {
        statusBox.textContent = "WebSocket error";
      };

      ws.onmessage = (event) => {
        removeTypingIndicator();

        if (!currentAssistantBubble) {
          currentAssistantBubble = appendMessage("assistant", event.data);
        } else {
          currentAssistantBubble.textContent += event.data;
        }

        chatContainer.scrollTop = chatContainer.scrollHeight;
      };
    }

    function appendMessage(role, text) {
      const row = document.createElement("div");
      row.className = `message-row ${role}`;

      const content = document.createElement("div");
      content.className = "message-content";

      const avatar = document.createElement("div");
      avatar.className = `avatar ${role}`;
      avatar.textContent = role === "user" ? "U" : "AI";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      content.appendChild(avatar);
      content.appendChild(bubble);
      row.appendChild(content);
      chatContainer.appendChild(row);

      chatContainer.scrollTop = chatContainer.scrollHeight;
      return bubble;
    }

    function addTypingIndicator() {
      removeTypingIndicator();

      const row = document.createElement("div");
      row.className = "message-row assistant";
      row.id = "typingRow";

      const content = document.createElement("div");
      content.className = "message-content";

      const avatar = document.createElement("div");
      avatar.className = "avatar assistant";
      avatar.textContent = "AI";

      const bubble = document.createElement("div");
      bubble.className = "bubble typing";
      bubble.textContent = "Thinking...";

      content.appendChild(avatar);
      content.appendChild(bubble);
      row.appendChild(content);
      chatContainer.appendChild(row);

      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeTypingIndicator() {
      const typingRow = document.getElementById("typingRow");
      if (typingRow) typingRow.remove();
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

      appendMessage("user", text);
      currentAssistantBubble = null;
      ws.send(text);
      input.value = "";
      addTypingIndicator();
    }

    function startNewChat() {
      chatContainer.innerHTML = "";
      currentAssistantBubble = null;

      if (ws) {
        ws.close();
      }

      connectSocket();
    }

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 200) + "px";
    });

    connectSocket();
  </script>
</body>
</html>
